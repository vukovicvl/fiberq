# Tool configuration for FiberQ dev tooling.
# NOTE: flake8 does NOT read pyproject.toml - its config lives in .flake8.

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
# Make the repo root importable so `import fiberq` works (plugin package is fiberq/).
pythonpath = ["."]
addopts = "-ra"
markers = [
    "qgis: test needs a running QgsApplication (provided by pytest-qgis)",
]

[tool.coverage.run]
source = ["fiberq"]
omit = [
    "fiberq/__init__.py",
    "*/resources/*",
    "*/styles/*",
    "*/icons/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.bandit]
# No severity threshold on the CLI — the plugins.qgis.org scanner runs ALL
# severities (it blocks on LOW findings like B110/B112). List B-IDs here only if
# a finding ever needs skipping. Prefer an inline `# nosec Bxxx` with a reason.
exclude_dirs = ["tests", "build", "dist", ".venv"]
